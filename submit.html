<!DOCTYPE html>
<html>
<head>
<title>Humans of Liquicity - Submit</title>
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="card">

<h1>Humans of Liquicity</h1>

<p>Share your story with the Liquicity family 🌌</p>

<form id="storyForm">

<input id="name" placeholder="Your name" required>

<input id="city" placeholder="Your home city" required>

<input id="festival" placeholder="First Liquicity Festival attended" required>

<input id="track" placeholder="Track that made you love Drum 'n' Bass" required>

<textarea id="message"
placeholder="Your message to the world"
required></textarea>

<label>
Upload image
</label>

<input type="file" id="image" accept="image/*">

<button>
Create my story
</button>

</form>

</div>


<script src="assets/submit.js"></script>

</body>
</html>
