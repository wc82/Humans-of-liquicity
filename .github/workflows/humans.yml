name: Humans of Liquicity Story Publisher

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write


jobs:

  create-page:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5


      - name: Create person page

        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

        run: |

          mkdir -p people

          python3 <<'PY'

          import os
          import re
          import html


          body = os.environ["ISSUE_BODY"]


          def get_field(field):

              match = re.search(
                  rf"### {re.escape(field)}\s*\n\s*(.*?)(?=\n###|$)",
                  body,
                  re.S
              )

              return match.group(1).strip() if match else ""


          name = get_field("Your Name") or "Anonymous"

          city = get_field("Your Home City")

          image_text = get_field("Upload Image Link")


          image = ""

          image_match = re.search(
              r"https?://[^\s\)\"<>]+",
              image_text
          )

          if image_match:
              image = image_match.group(0)


          slug = re.sub(
              r"[^a-z0-9]+",
              "-",
              name.lower()
          ).strip("-")


          folder = f"people/{slug}"


          counter = 2

          while os.path.exists(folder):

              folder = f"people/{slug}-{counter}"

              counter += 1


          os.makedirs(folder, exist_ok=True)


          reserved = [
              "Your Name",
              "Your Home City",
              "Upload Image Link"
          ]


          sections = re.findall(
              r"### (.*?)\n\n(.*?)(?=\n###|$)",
              body,
              re.S
          )


          story = []


          for question, answer in sections:

              if question.strip() in reserved:
                  continue


              story.append(
                  f"""
<div class="answer">

<h3>{html.escape(question.strip())}</h3>

<p>{html.escape(answer.strip())}</p>

</div>
"""
              )


          page = []

          page.append("<!DOCTYPE html>")
          page.append("<html>")
          page.append("<head>")
          page.append(
              f"<title>{html.escape(name)} - Humans of Liquicity</title>"
          )
          page.append(
              '<link rel="stylesheet" href="../../assets/style.css">'
          )
          page.append(
              '<meta name="viewport" content="width=device-width, initial-scale=1">'
          )
          page.append("</head>")
          page.append("<body>")


          page.append('<div class="profile">')


          if image:

              page.append(
                  f'<img src="{image}" class="profile-image">'
              )


          page.append(
              f"<h1>{html.escape(name)}</h1>"
          )


          page.append(
              f"<h3>📍 {html.escape(city)}</h3>"
          )


          page.append(
              "\n".join(story)
          )


          page.append(
              '<a href="../../">← Back to Humans of Liquicity</a>'
          )


          page.append("</div>")
          page.append("</body>")
          page.append("</html>")


          with open(
              f"{folder}/index.html",
              "w",
              encoding="utf-8"
          ) as file:

              file.write(
                  "\n".join(page)
              )


          PY



      - name: Create gallery homepage

        run: |

          python3 <<'PY'

          import glob
          import os
          import re
          import html


          cards = []


          for file in glob.glob("people/*/index.html"):


              with open(
                  file,
                  encoding="utf-8"
              ) as f:

                  page = f.read()


              folder = os.path.basename(
                  os.path.dirname(file)
              )


              name_match = re.search(
                  r"<h1>(.*?)</h1>",
                  page
              )


              image_match = re.search(
                  r'<img src="([^"]+)"',
                  page
              )


              city_match = re.search(
                  r"<h3>📍 (.*?)</h3>",
                  page
              )


              name = (
                  name_match.group(1)
                  if name_match
                  else folder.title()
              )


              image = (
                  image_match.group(1)
                  if image_match
                  else ""
              )


              city = (
                  city_match.group(1)
                  if city_match
                  else ""
              )


              cards.append(
                  """
<article class="human-card">

<a href="people/{folder}/">

<img src="{image}" class="human-image" loading="lazy">

<div class="card-content">

<h2>{name}</h2>

<p>📍 {city}</p>

<span>Read their story →</span>

</div>

</a>

</article>
""".format(
                      folder=folder,
                      image=image,
                      name=html.escape(name),
                      city=html.escape(city)
                  )
              )


          output = []


          output.append("<!DOCTYPE html>")
          output.append("<html>")
          output.append("<head>")
          output.append("<title>Humans of Liquicity</title>")
          output.append(
              '<meta name="viewport" content="width=device-width, initial-scale=1">'
          )
          output.append(
              '<link rel="stylesheet" href="assets/style.css">'
          )
          output.append("</head>")


          output.append("<body>")


          output.append(
              """
<header class="hero">

<h1>🌌 Humans of Liquicity</h1>

<p>
The people, stories and memories behind the Liquicity family
</p>

</header>
"""
          )


          output.append(
              '<main class="gallery">'
          )


          output.append(
              "\n".join(cards)
          )


          output.append(
              "</main>"
          )


          output.append("</body>")
          output.append("</html>")


          with open(
              "index.html",
              "w",
              encoding="utf-8"
          ) as f:

              f.write(
                  "\n".join(output)
              )


          PY



      - name: Commit pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "Update Humans of Liquicity pages" || echo "No changes"

          git push
