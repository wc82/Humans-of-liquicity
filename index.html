<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humans of Liquicity</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0b1220,#12243d,#1f4f68);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:#fff;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:30px;
    color:#cfd9e8;
}

.field{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type=text],
textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

input[type=file]{
    color:white;
}

button{
    width:100%;
    padding:16px;
    background:#27d7b5;
    color:#04111d;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#45f0d0;
}

.preview{
    margin-top:15px;
    display:none;
}

.preview img{
    max-width:220px;
    border-radius:12px;
    border:3px solid white;
}
</style>
</head>

<body>

<div class="container">

<h1>Humans of Liquicity</h1>

<p class="subtitle">
Share your story with the Liquicity community.
</p>

<form id="liquicityForm"
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
      enctype="multipart/form-data">

<div class="field">
<label>Your Name</label>
<input
type="text"
name="name"
required>
</div>

<div class="field">
<label>Your Home City</label>
<input
type="text"
name="city"
required>
</div>

<div class="field">
<label>First Liquicity Festival Attended</label>
<input
type="text"
name="festival"
required>
</div>

<div class="field">
<label>Track That Made You Love Drum 'n' Bass</label>
<input
type="text"
name="track"
required>
</div>

<div class="field">
<label>Your Message to the World</label>
<textarea
name="message"
required></textarea>
</div>

<div class="field">
<label>Upload Your Photo</label>
<input
type="file"
name="photo"
accept="image/*"
id="photoInput">

<div class="preview" id="preview">
<img id="previewImage">
</div>

</div>

<button type="submit">
Submit Your Story
</button>

</form>

</div>

<script>
const input = document.getElementById("photoInput");
const preview = document.getElementById("preview");
const img = document.getElementById("previewImage");

input.addEventListener("change", function(){

const file = this.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
img.src = e.target.result;
preview.style.display = "block";
}

reader.readAsDataURL(file);

});
</script>

</body>
</html>
